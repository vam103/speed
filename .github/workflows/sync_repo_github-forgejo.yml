# Sync repo to the Forgejo mirror
name: Repo sync (GitHub -> Forgejo)
on:
  push:
    branches:
      - '**'
  workflow_dispatch: # Manual dispatch
  schedule:
    - cron: "0 */6 * * *"

jobs:
  sync-repo-to-forgejo:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v2
        with:
          fetch-depth: 0
      - name: "Gather facts"
        run: |
          echo "Repo variables:"
          echo "  FORGEJO_PUSH_URL: https://codeberg.org/vam103/speed.git"
          echo "  FORGEJO_USERNAME: ${{ secrets.codeberg_username }}"
      - name: "Sync repo"
        uses: spyoungtech/mirror-action@master
        with:
          REMOTE: "https://codeberg.org/vam103/speed.git"
          GIT_USERNAME: ${{ secrets.codeberg_username }}
          GIT_PASSWORD: ${{ secrets.codeberg_password }}
